{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">🛒 Your Cart</h2>

<a href="/" class="btn btn-secondary mb-3">⬅ Back to Books</a>

<div class="row">

{% for item in items %}
    <div class="col-md-4">
        <div class="card shadow p-3 mb-4">

            <h4>{{ item.book.title }}</h4>
            <p><strong>Price:</strong> ₹{{ item.book.price }}</p>

            <div class="d-flex gap-2">
                <a href="/order/{{ item.id }}/" class="btn btn-success">
                    ✅ Order
                </a>

                <a href="/remove/{{ item.id }}/" class="btn btn-danger">
                    ❌ Remove
                </a>
            </div>

        </div>
    </div>
{% empty %}
    <p>No items in cart</p>
{% endfor %}

</div>

{% endblock %}
